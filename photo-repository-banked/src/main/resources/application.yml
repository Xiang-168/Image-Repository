server:
  port: 8234
  servlet:
    context-path: /api
spring:
  application:
    name: photo-repository
    # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/photo_repository
    username: root
    password: 123456
mybatis-plus:
  configuration:
      # MyBatis 配置
      map-underscore-to-camel-case: true
      # 仅在开发环境下打印日志
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      default:

        api-rule: package
        api-rule-resources:
          - com.hzx.photorepository.controller
